<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envelope with Read/Write Toggle</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href=".\..\..\static\styles\postcards\opening-envelope-styles.css"/>
</head>
<body>

    <input type="checkbox" id="mode-toggle">

    <div class="envelope-container">
        
        <input type="checkbox" id="envelope-toggle">
        <input type="file" id="file-upload" accept="image/*">

        <label for="file-upload" class="wax-seal" title="Upload & Open">
            <span class="seal-icon">🚀</span>
        </label>

        <div class="mode-switch-wrapper">
            <label for="mode-toggle" class="switch-label mode-write">Write</label>
            <label for="mode-toggle" class="switch-label mode-read">Read</label>
        </div>

        <div class="envelope-wrapper">
            <div class="card-inside" id="card-element">
                <img id="card-image" src="https://picsum.photos/id/1015/600/400" alt="Static">
            </div>
            <div class="flap pocket"></div>
            <div class="flap lid"></div>
        </div>

    </div>

    <script src=".\..\..\static\scripts\postcards\opening-envelope-script.js"></script>
</body>
</html>
