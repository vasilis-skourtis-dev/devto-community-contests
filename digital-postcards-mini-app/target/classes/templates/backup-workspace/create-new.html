<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Postcard</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/postcards/postcard-dualside-styles.css}"/>
</head>
<body>

<input type="checkbox" id="card-toggle">

<div class="scene">

    <form th:action="@{/cards/create}" th:object="${cardCreateRequest}" method="POST" enctype="multipart/form-data" style="display: contents;">

        <div class="control-panel">
            <div class="left-side">
                <div class="icon-btn">
                    <a th:href="@{/}" style="text-decoration: none; color: inherit;">🏠</a>
                </div>
            </div>

            <div class="right-side">
                <label for="card-toggle" class="icon-btn flip-trigger" title="Flip">↻</label>
            </div>
        </div>

        <div class="main-panel">
            <div class="card-wrapper">

                <label for="cardFrontImage" class="card-face face-front" style="cursor: pointer; display: block;" title="Click to upload cover">

                    <input type="file" th:field="*{cardFrontImage}" accept="image/*" required style="display: none;">

                    <div id="upload-overlay" style="position: absolute; inset: 0; background: rgba(255,255,255,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 1.5rem; color: #444; z-index: 10; border: 4px dashed #ccc; transition: opacity 0.3s;">
                        <span style="font-size: 3rem;">📷</span>
                        <strong>Click to pick a photo</strong>
                    </div>

                    <img id="front-preview" src="https://picsum.photos/id/1015/900/600" alt="Cover Preview" class="cover-image" style="opacity: 0.3; transition: opacity 0.3s;">
                </label>


                <div class="card-face face-back">
                    <header class="card-header">

                        <div class="card-title" style="width: 70%;">
                            <input type="text" th:field="*{title}"
                                   placeholder="Postcard Title" required
                                   style="font-family: 'Cinzel', serif; font-size: 2rem; color: #444; border: none; background: transparent; border-bottom: 2px dashed #ccc; width: 100%; outline: none; padding-bottom: 5px;">
                        </div>

                        <div class="stamp-wrapper">
                            <button type="submit" title="Create & Download Postcard!"
                                    style="background: transparent; border: none; cursor: pointer; outline: none; transition: transform 0.2s;"
                                    onmouseover="this.style.transform='scale(1.1)'"
                                    onmouseout="this.style.transform='scale(1)'">

                                <div class="stamp-frame">
                                    <small style="display: block; font-weight: bold; color: #b93b21; margin-top: 5px;">CREATE</small>
                                </div>

                            </button>
                        </div>

                    </header>

                    <main style="flex-grow: 1;">
                        <textarea class="ruled-paper" th:field="*{message}" placeholder="Write your secret message here..." required></textarea>
                    </main>
                </div>

            </div>
        </div>

    </form>
</div>

<script>
    // Updated the ID here to match the one generated by th:field="*{cardFrontImage}"
    document.getElementById('cardFrontImage').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            // Update preview image
            const preview = document.getElementById('front-preview');
            preview.src = URL.createObjectURL(file);
            preview.style.opacity = '1';

            // Hide the upload instructions overlay
            document.getElementById('upload-overlay').style.opacity = '0';

            // Auto-flip card to the back after a tiny delay so they can type
            setTimeout(() => {
                document.getElementById('card-toggle').checked = true;
            }, 600);
        }
    });
</script>

</body>
</html>
