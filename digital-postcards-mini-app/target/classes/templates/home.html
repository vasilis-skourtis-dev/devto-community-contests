<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Digital Postcards</title>
    <link rel="stylesheet" th:href="@{/styles/postcards/opening-envelope-styles.css}"/>
</head>
<body>

<!--    <input type="checkbox" id="mode-toggle">-->

    <div class="envelope-container">

        <input type="checkbox" id="envelope-toggle">

        <form id="uploadImageForm" method="post" enctype="multipart/form-data" th:action="@{/cards/read}">
            <input type="file" id="file-upload" name="image" accept="image/*">
        </form>

        <label for="file-upload" class="wax-seal" title="Upload & Open">
            <span class="seal-icon"></span>
        </label>

        <div class="mode-switch-wrapper">
            <label class="switch-label mode-read">
                <a th:href="@{/}" class="active"> &#128366; </a>
            </label>
            <label class="switch-label mode-write">
                <a th:href="@{/create}"> &#128393; </a>
            </label>
        </div>

        <div class="envelope-wrapper">
            <div class="card-inside" id="card-element">
                <img id="card-image" src="https://picsum.photos/id/1015/600/400" alt="Static">
            </div>
            <div class="flap pocket"></div>
            <div class="flap lid"></div>
        </div>

    </div>

    <script th:src="@{/scripts/postcards/opening-envelope-script.js}"></script>
</body>
</html>
