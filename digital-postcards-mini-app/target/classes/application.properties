spring.application.name=special-cards-reader

#server.port=8080
#server.port=8888
server.port=9090

#Security
# Set global session timeout (optional, redundant with setMaxInactiveInterval)
server.servlet.session.timeout=75m
#server.servlet.session.timeout=3m

# Enable multipart file uploads
spring.servlet.multipart.enabled=true
# Max file size (example: 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.org.thymeleaf=DEBUG
logging.level.org.springframework.web=DEBUG


#Access logs config
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=D:/logs/active/cards/access
#server.tomcat.accesslog.directory=/var/logs/active/cards/access
#server.tomcat.accesslog.directory=/home/logs/active/cards/access
server.tomcat.accesslog.prefix=access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.file-date-format=.yyyy-MM-dd
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D

#logging.file.path=/home/logs/active/cards/app
logging.file.path=D:/logs/active/cards/app



spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

